<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="围棋解谜游戏 - 每日谜题与技巧训练">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="围棋谜题">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="theme-color" content="#f9f4ec">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>围棋谜题</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f9f4ec;
      color-scheme: light;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /*
     * Disable Safari/WebKit backdrop-filter and white host backgrounds inside
     * the Flutter rendering surface.
     *
     * Newer Flutter web builds render through a shadow-root-backed
     * flutter-view/flt-glass-pane host. On Safari, any translucent Cupertino
     * bar can cause that host layer to paint as solid white, which covers the
     * page and makes the bottom tab bar appear missing.
     *
     * The app also disables those blur paths in Dart, but keep this as a
     * defensive fallback for generated DOM that still exposes these hosts.
     */
    flutter-view,
    flt-glass-pane,
    flt-scene-host {
      background: transparent !important;
    }

    flutter-view,
    flutter-view *,
    flt-glass-pane,
    flt-glass-pane *,
    flt-scene-host,
    flt-scene-host * {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }
  </style>
</head>
<body>
  <!-- Vendored WebGL2 JS interop bindings for three_js/flutter_angle (SHA: edea19f9d38cda33c3fbf1d6a3df17a1fd2d8349). -->
  <script src="gles_bindings.js"></script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // When a new service worker takes control (after skipWaiting), reload once
    // so users always see the latest version without manually clearing cache.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
