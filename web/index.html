  <title>围棋谜题</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1C1C1E;
      overflow: hidden;
      overscroll-behavior: none;
    }
    /*
     * Safety-net for non-shadow-DOM Flutter builds: disable backdrop-filter
     * on flt-glass-pane itself and any light-DOM descendants.
     * For shadow-DOM builds the JS below injects an equivalent <style>
     * directly into the shadow root, which is the only way to reach elements
     * like <flt-backdrop-filter> hidden behind the shadow boundary.
     */
    flt-glass-pane,
    flt-glass-pane * {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }
  </style>
</head>
<body>
  <script>
    // Flutter Web attaches a shadow root to flt-glass-pane (open mode).
    // Document-level CSS cannot cross that shadow boundary, so backdrop-filter
    // rules in <head> never reach <flt-backdrop-filter> elements inside it.
    // We use a MutationObserver to detect when flt-glass-pane is created and
    // immediately inject a <style> into its shadow root.  This eliminates the
    // iOS WebKit bug where any backdrop-filter inside overflow:hidden causes
    // the entire Flutter canvas to render as a solid white overlay, hiding all
    // content including the bottom tab bar.
    (function () {
      function tryPatch() {
        var pane = document.querySelector('flt-glass-pane');
        if (pane && pane.shadowRoot) {
          var s = document.createElement('style');
          s.textContent =
            '* { -webkit-backdrop-filter: none !important; backdrop-filter: none !important; }';
          pane.shadowRoot.prepend(s);
          cleanup();
        }
      }
      function cleanup() {
        observer.disconnect();
        clearTimeout(timeoutId);
      }
      var observer = new MutationObserver(tryPatch);
      observer.observe(document.documentElement, {childList: true, subtree: true});
      // Stop observing after 10 s if flt-glass-pane never appears.
      var timeoutId = setTimeout(cleanup, 10000);
      tryPatch(); // also run immediately in case pane already exists
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
