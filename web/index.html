      background: #1C1C1E;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /*
     * Disable backdrop-filter inside the Flutter rendering surface.
     *
     * CupertinoSliverNavigationBar and CupertinoTabBar emit CSS
     * backdrop-filter:blur() in their large-title / frosted-glass states.
     * On iOS Safari and Android Chrome the filter causes the entire
     * flt-glass-pane stacking context to paint white, producing the
     * full-screen white overlay and hiding the bottom tab bar.
     * Desktop browsers (macOS Chrome/Safari) handle the property correctly
     * so the bug is mobile-only.  Disabling it here gives a solid opaque
     * background instead of frosted glass, which is visually identical when
     * the bar background colour is already opaque.
     */
    flt-glass-pane,
    flt-glass-pane * {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }
  </style>
