<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Baduk Puzzle - 放鬆動腦的圍棋小挑戰">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Baduk Puzzle">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="theme-color" content="#f9f4ec">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="assets/assets/fonts/app_local_cjk_subset.ttf" as="font" type="font/ttf" crossorigin>

  <title>Baduk Puzzle</title>

  <style>
    :root {
      --app-local-cjk-font-family: "AppLocalCjk";
      --app-local-cjk-font-stack: system-ui, -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Segoe UI",
        "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC",
        "WenQuanYi Micro Hei", sans-serif;
    }

    @font-face {
      font-family: "AppLocalCjk";
      src: local("PingFang SC"), local("Hiragino Sans GB"),
        local("Microsoft YaHei"), local("Noto Sans CJK SC"),
        local("Source Han Sans SC"), local("WenQuanYi Micro Hei"),
        url("assets/assets/fonts/app_local_cjk_subset.ttf") format("truetype");
      font-style: normal;
      font-weight: 100 900;
      font-display: block;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f9f4ec;
      color-scheme: light;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: var(--app-local-cjk-font-family),
        var(--app-local-cjk-font-stack);
    }

    /*
     * Disable Safari/WebKit backdrop-filter and white host backgrounds inside
     * the Flutter rendering surface.
     *
     * Newer Flutter web builds render through a shadow-root-backed
     * flutter-view/flt-glass-pane host. On Safari, any translucent Cupertino
     * bar can cause that host layer to paint as solid white, which covers the
     * page and makes the bottom tab bar appear missing.
     *
     * The app also disables those blur paths in Dart, but keep this as a
     * defensive fallback for generated DOM that still exposes these hosts.
     */
    flutter-view,
    flt-glass-pane,
    flt-scene-host {
      background: transparent !important;
      font-family: var(--app-local-cjk-font-family),
        var(--app-local-cjk-font-stack);
    }

    flutter-view,
    flutter-view *,
    flt-glass-pane,
    flt-glass-pane *,
    flt-scene-host,
    flt-scene-host * {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }
  </style>
</head>
<body>
  <!-- Vendored WebGL2 JS interop bindings for three_js/flutter_angle (SHA: edea19f9d38cda33c3fbf1d6a3df17a1fd2d8349). -->
  <script src="gles_bindings.js"></script>
  <script>
    (() => {
      const localFontAsset = 'assets/assets/fonts/app_local_cjk_subset.ttf';
      const downloadableFontPaths = [
        /\/s\/roboto\//,
        /\/s\/notosanssc\//,
        /\/s\/notosanshk\//,
        /\/s\/notosanssymbols\//,
      ];
      const nativeFetch = window.fetch?.bind(window);
      if (!nativeFetch) return;
      window.fetch = (input, init) => {
        const requestUrl =
          typeof input === 'string' ? input : input instanceof URL ? input.href : input?.url;
        if (requestUrl) {
          const url = new URL(requestUrl, window.location.href);
          if (
            url.hostname === 'fonts.gstatic.com' &&
            downloadableFontPaths.some((pattern) => pattern.test(url.pathname))
          ) {
            return nativeFetch(localFontAsset, init);
          }
        }
        return nativeFetch(input, init);
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // When a new service worker takes control (after skipWaiting), reload once
    // so users always see the latest version without manually clearing cache.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
