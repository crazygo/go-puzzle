name: Build iOS IPA and Upload to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-testflight:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure iOS app identifiers for CI
        run: |
          if [ -z "${IOS_APP_BUNDLE_ID}" ]; then
            echo "Missing IOS_APP_BUNDLE_ID secret" >&2
            exit 1
          fi
          if [ -z "${IOS_DEVELOPMENT_TEAM}" ]; then
            echo "Missing IOS_DEVELOPMENT_TEAM secret" >&2
            exit 1
          fi
          sed -i.bak "s|^APP_BUNDLE_IDENTIFIER =.*$|APP_BUNDLE_IDENTIFIER = ${IOS_APP_BUNDLE_ID}|" ios/Flutter/Release.xcconfig
          sed -i.bak "s|^APP_DEVELOPMENT_TEAM =.*$|APP_DEVELOPMENT_TEAM = ${IOS_DEVELOPMENT_TEAM}|" ios/Flutter/Release.xcconfig
          echo "Using bundle id ${IOS_APP_BUNDLE_ID} and team ${IOS_DEVELOPMENT_TEAM}"
        env:
          IOS_APP_BUNDLE_ID: ${{ secrets.IOS_APP_BUNDLE_ID }}
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Install Codemagic CLI tools
        run: |
          pipx install codemagic-cli-tools==0.56.4
          pipx ensurepath
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Initialize temporary keychain
        run: keychain initialize
        env:
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.IOS_CERT_PRIVATE_KEY }}

      - name: Fetch App Store distribution signing files
        run: |
          app-store-connect fetch-signing-files "$IOS_APP_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates
          xcode-project use-profiles
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.IOS_CERT_PRIVATE_KEY }}
          IOS_APP_BUNDLE_ID: ${{ secrets.IOS_APP_BUNDLE_ID }}

      - name: Build IPA
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          flutter build ipa --release \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$HOME/export_options.plist"

      - name: Upload IPA to App Store Connect
        run: |
          IPA_PATH=$(find "$PWD/build/ios/ipa" -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: No IPA found in build/ios/ipa" >&2
            exit 1
          fi
          echo "Uploading $IPA_PATH"
          app-store-connect publish --path "$IPA_PATH"
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Restore login keychain
        if: always()
        run: keychain use-login
