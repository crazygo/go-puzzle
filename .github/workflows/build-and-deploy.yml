name: Build & Deploy

on:
  push:
    branches: [main, master, copilot/**]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Flutter Web build + GitHub Pages deployment
  # ──────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: "stable"
          cache: true

      - name: Enable web support
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Capture first screen screenshot
        run: |
          SCREENSHOT_DIR="${RUNNER_TEMP}/go-puzzle-screenshots" \
            bash scripts/capture-first-screen.sh

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: first-screen-screenshots
          path: ${{ runner.temp }}/go-puzzle-screenshots
          if-no-files-found: error

      - name: Build web (release)
        run: |
          flutter build web \
            --release \
            --no-wasm-dry-run \
            --base-href /go-puzzle/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ──────────────────────────────────────────────────────────────────────────
  # 2. iOS build (requires macOS + Xcode)
  # ──────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no-codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
