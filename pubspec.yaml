name: go_puzzle
description: 围棋解谜游戏 - A Go (围棋) puzzle game with daily challenges and skill training.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # UI utilities
  cupertino_icons: ^1.0.6
  image_picker: ^1.1.2
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
