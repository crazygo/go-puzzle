name: go_puzzle
description: Baduk Puzzle - 放鬆動腦的圍棋小挑戰。
publish_to: "none"

version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # UI utilities
  cupertino_icons: ^1.0.6
  image_picker: ^1.1.2
  image: ^4.2.0
  three_js: ^0.2.7
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  flutter_onnxruntime: ^1.7.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/textures/
    - docs/ai_eval/tactics/problems.json
